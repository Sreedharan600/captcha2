<!DOCTYPE html>
<html>
<head>
  <title>Simple Captcha</title>

  <style>
    /* Mobile Phones */
@media (max-width: 600px) {

  .box{
    width: 90%;
    padding: 20px;
  }

  h2{
    font-size: 22px;
  }

  .captcha{
    font-size: 20px;
    letter-spacing: 3px;
    padding: 8px;
  }

  button{
    padding: 8px;
    font-size: 14px;
  }

  input{
    padding: 8px;
    font-size: 14px;
  }

}
    body{
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      background:#e7e5e1;
      background:linear-gradient(135deg, #ec5e3b, #36a5eb);
      font-family:Arial;
    }

    .box{
      box-shadow: 8px 8px 12px hsl(0, 100%, 61%), -8px -8px 12px hsl(187, 100%, 61%)   ;
      background:rgb(240, 238, 238);
      padding:25px;
      border-radius:10px;
      width:300px;
      text-align:center;
    }

    h2{
      margin-bottom:20px;
    }

    .captcha-box{
      display:flex;
      gap:10px;
      margin-bottom:20px;
    }

    .captcha{
      flex:1;
      border:1px solid gray;
      padding:10px;
      font-size:25px;
      letter-spacing:5px;
    }

    button{
      background:#5faaff;
      background:linear-gradient(135deg, #ff775f, #36a5eb);
      color:white;
      border:none;
      padding:10px;
      border-radius:5px;
      cursor:pointer;
    }

    input{
      width:100%;
      padding:10px;
      margin-bottom:15px;
      border:1px solid gray;
      border-radius:5px;
    }

    .submit{
      width:100%;
    }
  
  </style>
</head>

<body>

  <div class="box">

    <h2>Captcha Generator</h2>

    <div class="captcha-box">
      <div class="captcha" id="captcha">AB12</div>

      <button onclick="createCaptcha()">
        🔄️
      </button>
    </div>

    <input type="text" id="input" placeholder="Enter Captcha">

    <button class="submit" onclick="checkCaptcha()">
      Submit
    </button>

  </div>

  <script >

    let chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ123456789";
    let captchaText = "";

    function createCaptcha(){

      captchaText = "";

      for(let i=0; i<4; i++){

        captchaText += chars[Math.floor(Math.random()*chars.length)];

      }

      document.getElementById("captcha").innerText = captchaText;
    }

    createCaptcha();

    function checkCaptcha(){

      let userInput = document.getElementById("input").value;

      if(userInput == captchaText){

        alert("Captcha Correct");

      }
      else{

        alert("Wrong Captcha");

      }

    }

  </script>

</body>
</html>
